<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>撲克勝率</title>
  <meta name="theme-color" content="#0d3b2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="撲克勝率">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>撲克勝率</h1>
    <div class="header-btns">
      <button id="modeBtn" type="button">練習模式</button>
      <button id="resetBtn" type="button">重置牌局</button>
    </div>
  </header>

  <main>
    <div id="calcView">
    <section id="results" class="empty">
      <div class="big-stat">
        <span class="big-label">勝率</span>
        <span id="winPct" class="big-value">–</span>
      </div>
      <div class="sub-stats">
        <div><span class="sub-label">平手</span><span id="tiePct">–</span></div>
        <div><span class="sub-label">敗率</span><span id="losePct">–</span></div>
        <div><span class="sub-label">權益</span><span id="equityPct">–</span></div>
      </div>
      <div id="handName"></div>
      <div id="status"></div>
      <div id="advice" hidden>
        <div id="adviceAction"></div>
        <div id="adviceReason"></div>
        <div id="adviceNote" class="advice-note">簡化模型建議，僅供參考</div>
      </div>
    </section>

    <section class="panel">
      <h2>對手（點「棄」標記棄牌）</h2>
      <div id="oppList"></div>
      <button id="addOppBtn" type="button">＋ 新增對手</button>
    </section>

    <section class="panel">
      <h2>我的位置與底池</h2>
      <div class="hero-ctx">
        <label>位置
          <select id="heroPos"></select>
        </label>
        <label>底池大小
          <input id="potSize" type="number" inputmode="decimal" min="0" placeholder="選填">
        </label>
        <label>需跟注額
          <input id="toCall" type="number" inputmode="decimal" min="0" placeholder="0">
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="slots-row">
        <div class="slot-group">
          <h2>我的手牌</h2>
          <div id="heroSlots" class="slots"></div>
        </div>
        <div class="slot-group">
          <h2>公共牌</h2>
          <div id="boardSlots" class="slots"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>選牌</h2>
      <div id="picker"></div>
    </section>
    </div>

    <div id="quizView" hidden>

      <!-- 關卡地圖（練習模式首頁） -->
      <div id="quizHome">
        <section class="panel">
          <h2>關卡（每關 10 題，7 分過關解鎖下一關）</h2>
          <div id="quizLevels"></div>
        </section>

        <section class="panel">
          <button id="quizFreeBtn" type="button">自由練習（無限出題）</button>
          <div class="quiz-stats quiz-home-stats">
            <div><span class="sub-label">總題數</span><span id="qsTotal">0</span></div>
            <div><span class="sub-label">正確率</span><span id="qsAcc">–</span></div>
            <div><span class="sub-label">最佳連對</span><span id="qsBest">0</span></div>
          </div>
        </section>

        <section class="panel" id="quizWeakPanel" hidden>
          <h2>待加強的情境（答題 ≥5 且正確率 &lt;60%）</h2>
          <div id="quizWeak"></div>
        </section>

        <section class="panel">
          <button id="quizResetBtn" type="button">重設所有練習紀錄</button>
        </section>
      </div>

      <!-- 答題 -->
      <div id="quizPlay" hidden>
        <section class="panel quiz-play-header" id="quizPlayHeader">
          <div id="quizPlayInfo"></div>
          <button id="quizExitBtn" type="button">離開</button>
        </section>

        <section class="panel">
          <div id="quizTag"></div>
          <div id="quizPrompt"></div>
          <div class="quiz-cards-row">
            <div class="quiz-card-group">
              <h2>你的手牌</h2>
              <div id="quizHand" class="quiz-cards"></div>
            </div>
            <div class="quiz-card-group" id="quizBoardGroup" hidden>
              <h2>公共牌</h2>
              <div id="quizBoard" class="quiz-cards"></div>
            </div>
          </div>
          <div id="quizChoices"></div>
          <div id="quizFeedback" hidden>
            <div id="quizVerdict"></div>
            <div id="quizExplain"></div>
          </div>
          <button id="quizNextBtn" type="button" hidden>下一題 →</button>
        </section>
      </div>

      <!-- 關卡結算 -->
      <div id="quizResultView" hidden>
        <section class="panel quiz-result">
          <div id="quizResultTitle"></div>
          <div id="quizStars"></div>
          <div id="quizScore"></div>
          <div id="quizStarHint"></div>
          <div id="quizReview"></div>
          <div class="quiz-result-btns">
            <button id="quizRetryBtn" type="button">重打本關</button>
            <button id="quizNextLevelBtn" type="button">下一關 →</button>
            <button id="quizMapBtn" type="button">回關卡列表</button>
          </div>
        </section>
      </div>

    </div>
  </main>
  <script src="poker.js"></script>
  <script src="gto.js"></script>
  <script src="app.js"></script>
  <script src="quiz.js"></script>
  <script src="quiz-ui.js"></script>
</body>
</html>
